AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda + Custom Resource to initialize RDS database with schema and seed data'

Parameters:
  Environment:
    Type: String
    Default: "dev"
    Description: "Deployment environment (e.g., dev, staging, prod)"
    AllowedValues:
      - dev
      - staging
      - prod

  DBName:
    Type: String
    Default: "vortexdb"
    Description: "Name of the database"

  DBSecretArn:
    Type: String
    Description: "ARN of the Secrets Manager secret (from rds-stack outputs)"

  DBEndpoint:
    Type: String
    Description: "RDS instance endpoint (from rds-stack outputs)"

  LambdaFunctionName:
    Type: String
    Default: "vortex-init-db-function"
    Description: "Name of the Lambda function to initialize the RDS database"

Resources:
  VortexInitDBLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-init-db-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: InitDBPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DBSecretArn
              - Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${LambdaFunctionName}:*"

  VortexMysql2Layer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "${Environment}-mysql2-layer"
      Description: "mysql2 layer for RDS connectivity"
      Content:
        S3Bucket: !Sub "vortexcrm-${Environment}-lambda-layers"
        S3Key: "mysql2-layer.zip"
      CompatibleRuntimes:
        - nodejs20.x

  VortexInitDBLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt VortexInitDBLambdaExecutionRole.Arn
      Timeout: 300
      Layers:
        - !Ref VortexMysql2Layer
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub "${Environment}-private-subnet-id"
        SecurityGroupIds:
          - Fn::ImportValue: !Sub "${Environment}-db-sg-id"
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecretArn
          DB_ENDPOINT: !Ref DBEndpoint
          DB_NAME: !Ref DBName
      Code:
        ZipFile: |
          const mysql = require('mysql2/promise');
          const https = require('https');
          const { SecretsManagerClient, GetSecretValueCommand } = require('@aws-sdk/client-secrets-manager');

          const sendResponse = (event, context, status, reason = '') => {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({
                Status: status,
                Reason: reason,
                PhysicalResourceId: context.logStreamName,
                StackId: event.StackId,
                RequestId: event.RequestId,
                LogicalResourceId: event.LogicalResourceId,
              });
              const url = new URL(event.ResponseURL);
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) },
              };
              const req = https.request(options, resolve);
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          };

          const getCredentials = async (secretArn) => {
            const client = new SecretsManagerClient({});
            const response = await client.send(new GetSecretValueCommand({ SecretId: secretArn }));
            return JSON.parse(response.SecretString);
          };

          const initSchema = async (conn) => {
            await conn.execute(`
              CREATE TABLE IF NOT EXISTS users (
                id INT AUTO_INCREMENT PRIMARY KEY,
                email VARCHAR(255) NOT NULL UNIQUE,
                full_name VARCHAR(255),
                password_hash VARCHAR(255) NOT NULL,
                role VARCHAR(50) DEFAULT 'user',
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              )
            `);
            await conn.execute(`
              CREATE TABLE IF NOT EXISTS contacts (
                id INT AUTO_INCREMENT PRIMARY KEY,
                user_id INT NOT NULL,
                first_name VARCHAR(255) NOT NULL,
                last_name VARCHAR(255) NOT NULL,
                email VARCHAR(255) UNIQUE,
                phone VARCHAR(50),
                company VARCHAR(255),
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                FOREIGN KEY (user_id) REFERENCES users(id)
              )
            `);
            await conn.execute(`
              CREATE TABLE IF NOT EXISTS deals (
                id INT AUTO_INCREMENT PRIMARY KEY,
                contact_id INT NOT NULL,
                title VARCHAR(255) NOT NULL,
                value DECIMAL(10, 2),
                stage VARCHAR(50) DEFAULT 'prospecting',
                closed_at TIMESTAMP NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                FOREIGN KEY (contact_id) REFERENCES contacts(id)
              )
            `);
            await conn.execute(`
              CREATE TABLE IF NOT EXISTS activities (
                id INT AUTO_INCREMENT PRIMARY KEY,
                contact_id INT NOT NULL,
                deal_id INT,
                type VARCHAR(50) NOT NULL,
                notes TEXT,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                FOREIGN KEY (contact_id) REFERENCES contacts(id),
                FOREIGN KEY (deal_id) REFERENCES deals(id)
              )
            `);
            await conn.execute(`
              INSERT IGNORE INTO users (email, full_name, password_hash, role)
              VALUES ('admin@vortexcrm.com', 'Admin User', 'CHANGE_ME_ON_FIRST_LOGIN', 'admin')
            `);
            console.log('Schema and seed data initialized successfully');
          };

          exports.handler = async (event, context) => {
            console.log('Received event:', JSON.stringify(event));
            try {
              if (event.RequestType === 'Create') {
                const creds = await getCredentials(process.env.DB_SECRET_ARN);
                const conn = await mysql.createConnection({
                  host: process.env.DB_ENDPOINT,
                  port: 3306,
                  user: creds.username,
                  password: creds.password,
                  database: process.env.DB_NAME,
                  connectTimeout: 10000,
                });
                await initSchema(conn);
                await conn.end();
              }
              await sendResponse(event, context, 'SUCCESS');
            } catch (err) {
              console.error(err);
              await sendResponse(event, context, 'FAILED', err.message);
            }
          };

  VortexInitDBCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt VortexInitDBLambda.Arn

Outputs:
  InitDBLambdaArn:
    Description: "ARN of the DB init Lambda function"
    Value: !GetAtt VortexInitDBLambda.Arn
    Export:
      Name: !Sub "${Environment}-init-db-lambda-arn"

  DBName:
    Description: "Database name used during initialization"
    Value: !Ref DBName
    Export:
      Name: !Sub "${Environment}-init-db-name"
