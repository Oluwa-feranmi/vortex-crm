AWSTemplateFormatVersion: "2010-09-09"
Description: "VPC Stack for Networking"

Parameters:
  VpcCIDR:
    Type: String
    Default: "10.0.0.0/16"
    Description: "CIDR block for the VPC"
  
  PublicSubnetCIDR:
    Type: String
    Default: "10.0.1.0/24"
    Description: "CIDR block for the public subnet"
  
  PrivateSubnetCIDR:
    Type: String
    Default: "10.0.2.0/24"
    Description: "CIDR block for the private subnet"
  
  NetworkACLCIDR:
    Type: String
    Default: "0.0.0.0/0"
    Description: "CIDR block for the network ACL"
  
  Environment:
    Type: String
    Default: "dev"
    Description: "Deployment environment (e.g., dev, staging, prod)"
    AllowedValues: 
      - dev
      - staging
      - prod

Resources:
  VortexVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-vpc"

  VortexInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-igw"

  VortexVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref VortexInternetGateway
      VpcId: !Ref VortexVPC
  
  
  VortexPublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VortexVPC
      CidrBlock: !Ref PublicSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-public-subnet"

  VortexPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VortexVPC
      CidrBlock: !Ref PrivateSubnetCIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-private-subnet"

  VortexPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VortexVPC
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-public-route-table"

  VortexPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VortexVPCGatewayAttachment
    Properties:
      RouteTableId: !Ref VortexPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref VortexInternetGateway

  VortexPublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VortexPublicSubnet
      RouteTableId: !Ref VortexPublicRouteTable

  VortexNATGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: VortexVPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-nat-eip"

  VortexNATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt VortexNATGatewayEIP.AllocationId
      SubnetId: !Ref VortexPublicSubnet
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-nat-gateway"

  VortexPrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VortexVPC
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-private-route-table"

  VortexPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VortexPrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref VortexNATGateway

  VortexPrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VortexPrivateSubnet
      RouteTableId: !Ref VortexPrivateRouteTable

  VortexNetworkACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VortexVPC
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-network-acl"

  VortexNetworkACLInboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VortexNetworkACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref NetworkACLCIDR

  VortexNetworkACLOutboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VortexNetworkACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: !Ref NetworkACLCIDR

  VortexPublicSubnetNetworkACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VortexPublicSubnet
      NetworkAclId: !Ref VortexNetworkACL

  VortexPrivateSubnetNetworkACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VortexPrivateSubnet
      NetworkAclId: !Ref VortexNetworkACL

Outputs:
  VortexVPCId:
    Description: "VPC ID"
    Value: !Ref VortexVPC
    Export:
      Name: !Sub "${Environment}-vpc-id"

  VortexPublicSubnetId:
    Description: "Public Subnet ID"
    Value: !Ref VortexPublicSubnet
    Export:
      Name: !Sub "${Environment}-public-subnet-id"

  VortexPrivateSubnetId:
    Description: "Private Subnet ID"
    Value: !Ref VortexPrivateSubnet
    Export:
      Name: !Sub "${Environment}-private-subnet-id"